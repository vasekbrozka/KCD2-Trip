  :root{
    --bg:#e9ece0; --bg2:#dde2d0; --card:#f7f8f1; --card2:#edf0e5;
    --ink:#2b342b; --ink2:#68746a; --line:#dee2d3; --line2:#d2d8c4;
    --gold:#6f8a55; --goldbr:#86a068; --golddk:#54683f; --red:#b56b46; --reddeep:#9a5636;
    --chipbg:#e7ebdc; --chipink:#4d5a44;
    --shadow:0 1px 2px rgba(40,50,40,.05),0 8px 22px rgba(40,50,40,.09);
    --warnbg:#eef1e2; --warnink:#5f6b3f;
    --hero1:#2a332b; --hero2:#39463a; --hero3:#4a5a49;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#141a15; --bg2:#0f140f; --card:#1e261f; --card2:#18201a;
      --ink:#e8ece0; --ink2:#9fb09f; --line:#2f3a2e; --line2:#3c4a3a;
      --gold:#8aa269; --goldbr:#a2bb80; --golddk:#5f7544; --red:#d3865f; --reddeep:#b86f48;
      --chipbg:#262f22; --chipink:#c3d2b0;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.45);
      --warnbg:#242c1b; --warnink:#cdd6a0;
      --hero1:#0c110d; --hero2:#141b15; --hero3:#1e281f;
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-bottom:calc(80px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; -webkit-text-size-adjust:100%;
  }
  ::selection{background:color-mix(in srgb,var(--gold) 45%,transparent)}
  /* ---------- HERO ---------- */
  .hero{
    position:relative; overflow:hidden; color:#f3f1e6;
    background:
      linear-gradient(180deg, rgba(26,34,29,.5) 0%, rgba(26,34,29,.36) 42%, rgba(26,34,29,.6) 78%, rgba(26,34,29,.9) 100%),
      url("img/hero.jpg") center 36%/cover no-repeat;
    padding:calc(22px + env(safe-area-inset-top)) 22px 46px;
  }
  .hero .eyebrow{display:flex; align-items:center; gap:7px; font-size:11px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:#e9e7d9; text-shadow:0 1px 8px rgba(12,18,13,.6)}
  .hero h1{font-size:31px; line-height:1.08; margin-top:11px; font-weight:800; letter-spacing:-.015em; color:#f8f6ec; text-shadow:0 2px 16px rgba(12,18,13,.65)}
  .hero h1 .amp{color:var(--goldbr)}
  .hero .sub{margin-top:10px; font-size:13.5px; color:#e8e6d8; font-weight:600; line-height:1.45; text-shadow:0 1px 9px rgba(12,18,13,.6)}
  .hero .badges{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap}
  .hero .badge{font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.34); color:#eef0e6; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); text-shadow:0 1px 6px rgba(12,18,13,.4)}
  .hero .badge.gold{background:linear-gradient(180deg,var(--goldbr),var(--gold)); color:#23301c; border:0; box-shadow:0 3px 10px rgba(0,0,0,.28)}
  .castle{position:absolute; right:-8px; bottom:-8px; width:176px; opacity:.28; pointer-events:none}
  /* ---------- SHEET / PAGE ---------- */
  .page{max-width:600px; margin:-22px auto 0; position:relative; z-index:2; background:var(--bg); border-radius:26px 26px 0 0; padding:14px 16px 0; min-height:70vh}
  .day{display:none; animation:fade .3s ease}
  .day.on{display:block}
  @keyframes fade{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .dayhead{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:8px 2px 15px}
  .dayhead h2{font-size:23px; font-weight:800; letter-spacing:-.01em; line-height:1.18; text-wrap:balance}
  .km{font-size:12.5px; font-weight:800; color:var(--gold); white-space:nowrap; background:color-mix(in srgb,var(--gold) 15%,var(--card)); padding:7px 13px; border-radius:999px}
  .daysub{font-size:14.5px; color:var(--ink2); margin:9px 2px 13px; line-height:1.5; font-weight:500}
  .note{margin:2px 0 16px; font-size:13px; line-height:1.5; color:var(--warnink); font-weight:500; background:var(--warnbg); border-radius:16px; padding:13px 15px}
  .note b{font-weight:800}
  .note.ok{color:var(--ink2); background:color-mix(in srgb,var(--gold) 12%,var(--card))}
  .note.ok b{color:var(--red)}
  /* ---------- TOOLBAR (edit/progress) ---------- */
  .toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:2px 0 14px}
  .toolbar .tool{display:inline-flex; align-items:center; gap:6px; font:inherit; font-size:13px; font-weight:800; color:var(--chipink); background:var(--chipbg); border:0; border-radius:999px; padding:0 15px; height:38px; cursor:pointer; transition:transform .07s}
  .toolbar .tool:active{transform:translateY(2px)}
  .toolbar .tool.on{color:#23301c; background:linear-gradient(180deg,var(--goldbr),var(--gold)); box-shadow:0 3px 0 var(--golddk)}
  .toolbar .tool.ghost{background:transparent; color:var(--ink2); border:1.5px solid var(--line2)}
  .toolbar .prog{margin-left:auto; font-size:12.5px; font-weight:800; color:var(--ink2)}
  .toolbar .prog b{color:var(--gold)}
  .planseg{display:inline-flex; background:var(--chipbg); border-radius:999px; padding:3px; gap:2px}
  .planseg button{font:inherit; font-size:12.5px; font-weight:800; border:0; background:transparent; color:var(--ink2); padding:7px 14px; border-radius:999px; cursor:pointer; transition:background .16s,color .16s}
  .planseg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.14)}
  /* ---------- CARDS ---------- */
  .stops{display:flex; flex-direction:column; gap:14px}
  .card{background:var(--card); border-radius:20px; box-shadow:var(--shadow); overflow:hidden; position:relative; transition:opacity .2s}
  .card.hl{box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 55%,transparent),var(--shadow)}
  .card.current{box-shadow:0 0 0 2px color-mix(in srgb,var(--red) 60%,transparent),var(--shadow)}
  .card.done{opacity:.6}
  .card .cardimg{display:block; width:100%; height:196px; object-fit:cover; background:#0c0703}
  .card .body{padding:14px 16px 16px}
  .itemtop{display:flex; align-items:center; gap:11px; margin-bottom:9px}
  .check{width:28px; height:28px; border-radius:50%; border:2px solid var(--line2); background:transparent; flex:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; font-weight:800; color:transparent; transition:transform .1s}
  .check:active{transform:scale(.88)}
  .card.done .check{background:var(--gold); border-color:var(--gold); color:#23301c}
  @media (prefers-color-scheme: dark){ .card.done .check{color:#23301c} }
  .time{font-size:12px; font-weight:800; color:var(--gold); letter-spacing:.02em; background:color-mix(in srgb,var(--gold) 15%,transparent); padding:3px 11px; border-radius:999px; font-variant-numeric:tabular-nums}
  .card.hl .time{color:#23301c; background:var(--gold)}
  @media (prefers-color-scheme: dark){ .card.hl .time{color:#23301c} }
  .nowtag{font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:#23301c; background:var(--red); padding:3px 9px; border-radius:999px}
  @media (prefers-color-scheme: dark){ .nowtag{color:#23301c} }
  .card h3{font-size:17px; font-weight:800; display:flex; align-items:center; gap:9px; letter-spacing:-.01em; line-height:1.22}
  .card.done h3{text-decoration:line-through; text-decoration-color:color-mix(in srgb,var(--ink2) 70%,transparent)}
  .card h3 .em{font-size:20px; flex:none; line-height:1}
  .card p{font-size:14px; color:var(--ink2); margin-top:6px; line-height:1.5; font-weight:500}
  .card p b{color:var(--ink); font-weight:700}
  .card p i{color:var(--red); font-style:normal; font-weight:700}
  /* ---------- EDIT CONTROLS ---------- */
  .editbar{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:4px}
  .ebtn{font:inherit; font-size:15px; font-weight:800; color:var(--chipink); background:var(--chipbg); border:0; border-radius:10px; min-width:38px; height:36px; padding:0 9px; cursor:pointer}
  .ebtn:disabled{opacity:.3}
  .ebtn.move{font-size:12.5px}
  .ebtn.del{color:var(--red); background:color-mix(in srgb,var(--red) 13%,var(--card))}
  .empty{margin:2px 2px 4px; padding:16px; border:1.5px dashed var(--line2); border-radius:14px; color:var(--ink2); font-size:13.5px; font-weight:600; line-height:1.5; text-align:center}
  .movebtns{display:flex; gap:5px; margin-left:auto}
  /* ---------- BUTTONS ---------- */
  .btns{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
  .btn{display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size:13px; font-weight:700; color:var(--chipink); background:var(--chipbg); padding:0 14px; height:40px; border-radius:12px; border:0; transition:transform .07s; cursor:pointer}
  .btn:active{transform:translateY(2px)}
  .btn.primary{color:#23301c; font-weight:800; background:linear-gradient(180deg,var(--goldbr),var(--gold)); box-shadow:0 3px 0 var(--golddk)}
  .btn.primary:active{transform:translateY(3px); box-shadow:0 0 0 var(--golddk)}
  .fact{display:flex; gap:8px; align-items:flex-start; margin-top:12px; padding:10px 12px; border-radius:12px; background:color-mix(in srgb,var(--gold) 10%,var(--card2)); font-size:12.5px; line-height:1.45; color:var(--ink2); font-weight:600}
  .fact .fi{flex:none; font-size:14px; line-height:1.3}
  .plist{list-style:none; margin:12px 0 2px; padding:0; display:flex; flex-direction:column; gap:8px}
  .plist li{font-size:14px; font-weight:600; color:var(--ink); line-height:1.35; padding-left:2px}
  /* ---------- MÍSTA plán ---------- */

    } else prog.textContent='';
  }

  function gotoTicket(e){ if(e) e.preventDefault(); showDay('sat'); setTimeout(function(){ var t=document.getElementById('ticket'); if(t) t.scrollIntoView({behavior:'smooth',block:'center'}); },80); }

  // ---------- záložky ----------
  var tabs=document.querySelectorAll('#dayTabs button');
  var days={fri:document.getElementById('day-fri'),sat:document.getElementById('day-sat'),sun:document.getElementById('day-sun'),info:document.getElementById('day-info')};
  function showDay(key){
    currentTab=key;
    tabs.forEach(function(b){ b.classList.toggle('on', b.dataset.day===key); });
    Object.keys(days).forEach(function(k){ days[k].classList.toggle('on', k===key); });
    render();
    window.scrollTo({top:0});
  }
  tabs.forEach(function(b){ b.addEventListener('click', function(){ showDay(b.dataset.day); }); });

  document.querySelectorAll('#planseg button').forEach(function(b){ b.onclick=function(){ setActive(b.getAttribute('data-plan')); save(); render(); }; });
  document.getElementById('editToggle').onclick=function(){ editMode=!editMode; render(); };
  document.getElementById('resetBtn').onclick=resetMine;

  // ---------- init ----------
  state=load();
  render();

  // odpočet + auto-výběr dne
  var now=new Date();
  var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var d0=new Date(2026,6,17), d1=new Date(2026,6,18), d2=new Date(2026,6,19), msDay=86400000;
  var cd=document.getElementById('countdown');
  if(+today===+d0){ cd.textContent='🚗 Dnes vyrážíme do Turnova'; showDay('fri'); }
  else if(+today===+d1){ cd.textContent='⚔️ Dnes: akce na Troskách'; showDay('sat'); }
  else if(+today===+d2){ cd.textContent='🥾 Dnes: Podtrosecká údolí'; showDay('sun'); }
  else if(today>d2){ cd.textContent='✨ Krásné vzpomínky'; }
  else { var diff=Math.round((d0-today)/msDay);
    if(diff===1){ cd.textContent='⏳ Zítra vyrážíme!'; }
    else { var w=(diff>=2&&diff<=4)?'dny':'dní'; cd.textContent='⏳ Za '+diff+' '+w+' vyrážíme'; } }
})();
</script>

if ('serviceWorker' in navigator) {
  addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js'); });
}
</script>
